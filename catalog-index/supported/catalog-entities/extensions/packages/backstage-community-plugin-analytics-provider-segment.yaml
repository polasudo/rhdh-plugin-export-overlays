apiVersion: extensions.backstage.io/v1alpha1
kind: Package
metadata:
  name: backstage-community-plugin-analytics-provider-segment
  namespace: rhdh
  title: "Analytics Provider Segment"
  links:
    - url: https://red.ht/rhdh
      title: Homepage
    - url: https://github.com/backstage/community-plugins/issues
      title: Bugs
    - title: Source Code
      url: https://github.com/backstage/community-plugins/tree/main/workspaces/analytics
  annotations:
    backstage.io/source-location: url:https://github.com/backstage/community-plugins/tree/main/workspaces/analytics
  tags: []
spec:
  packageName: "@backstage-community/plugin-analytics-provider-segment"
  # Tag: 1.11--1.27.0, Build date: 2026-07-06T11:40:04Z
  dynamicArtifact: "oci://quay.io/rhdh/backstage-community-plugin-analytics-provider-segment@sha256:e72b582a42c482285f39af9e56fbf9f7441b6107d6092210467b1f5299f23dcb"
  version: 1.27.0
  backstage:
    role: frontend-plugin
    supportedVersions: 1.49.4
  author: Red Hat
  support: generally-available
  lifecycle: active
  partOf:
    - analytics-provider-segment
  appConfigExamples:
    - title: Default configuration
      content:
        dynamicPlugins:
          frontend:
            backstage-community.plugin-analytics-provider-segment:
              analyticsApiExtensions:
                - importName: SegmentAnalytics
        backend:
          csp:
            script-src:
              - "'self'"
              - "'unsafe-eval'"
              - https://cdn.segment.com
        app:
          analytics:
            segment:
              writeKey: ${SEGMENT_WRITE_KEY}
              maskIP: true
              testMode: ${SEGMENT_TEST_MODE}
              appVersion: ${RHDH_VERSION}
              backstageVersion: ${BACKSTAGE_VERSION}
